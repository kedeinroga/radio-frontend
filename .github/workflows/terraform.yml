name: Terraform

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/terraform.yml'

# Only one Terraform run at a time to avoid state conflicts.
concurrency:
  group: terraform
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write  # Required for Workload Identity Federation

jobs:
  terraform:
    name: Terraform ${{ github.event_name == 'push' && 'Apply' || 'Plan' }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    steps:
      - uses: actions/checkout@v4

      # Keyless auth to GCP via Workload Identity Federation.
      # No service account key stored in GitHub — uses OIDC token instead.
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_TERRAFORM_SA }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9'

      - name: Terraform Init
        run: terraform init -backend-config="bucket=${{ vars.GCP_PROJECT_ID }}-tfstate"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      # On PRs: show the plan as a dry-run (no changes applied).
      - name: Terraform Plan
        run: |
          terraform plan \
            -var="project_id=${{ vars.GCP_PROJECT_ID }}" \
            -var="github_owner=${{ github.repository_owner }}" \
            -var="github_repo=${{ github.event.repository.name }}"

      # On push to main: apply the plan automatically.
      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          terraform apply -auto-approve \
            -var="project_id=${{ vars.GCP_PROJECT_ID }}" \
            -var="github_owner=${{ github.repository_owner }}" \
            -var="github_repo=${{ github.event.repository.name }}"
