name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-progress runs on the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

  build:
    name: Build Next.js
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Dummy values — only validates the build compiles correctly.
      # Real NEXT_PUBLIC_* vars are baked in by Cloud Build from Secret Manager.
      - name: Build
        run: npm run build
        env:
          NODE_ENV: production
          NEXT_PUBLIC_APP_URL: https://rradio.online
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_dummy
          NEXT_PUBLIC_GOOGLE_ADSENSE_ID: ca-pub-dummy
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_dummy
          STRIPE_PRICE_ID_MONTHLY: price_dummy_monthly
          STRIPE_PRICE_ID_YEARLY: price_dummy_yearly
          API_URL: https://api.rradio.online/api/v1
          API_SECRET_KEY: dummy_secret

      - name: Check build output
        run: |
          if [ -d "apps/next/.next" ]; then
            echo "Build successful"
            du -sh apps/next/.next
          else
            echo "Build output not found"
            exit 1
          fi

  status-check:
    name: Status Check
    runs-on: ubuntu-latest
    needs: [lint, build]
    if: always()

    steps:
      - name: Check job results
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "CI failed"
            exit 1
          else
            echo "All CI checks passed"
          fi
